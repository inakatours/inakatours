<style>
.reviews-section { padding: 60px 20px; }
.reviews-title { color: #c0392b; font-size: 36px; margin-bottom: 30px; }
.slider-wrapper { position: relative; }
.review-slider {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  padding: 10px;
}
.review-slider::-webkit-scrollbar { display: none; }
.review-card {
  flex: 0 0 300px;
  scroll-snap-align: start;
  background: #f3ede0;
  border-radius: 16px;
  padding: 25px;
  border: 1px solid #e0d8c8;
}
.stars { color: #f5a623; }
.slider-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: #c0392b;
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 50%;
}
</style>
